name: Auto Close Pull Requests

on:
  pull_request_target:
    types: [opened]

jobs:
  close-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: |
      github.event.pull_request.user.login != github.repository_owner && 
      github.event.pull_request.user.login != 'victoriamarinus'
    steps:
      - name: Close Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Bedankt voor de interesse. Dit portfolio is een persoonlijk project en accepteert geen externe bijdragen of Pull Requests. Wijzigingen worden uitsluitend door de eigenaar beheerd."
            });